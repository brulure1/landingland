<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>landingland — Hub</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/shared/base.css">
  <style>
    body {
      font-family: var(--font-sans);
      background: var(--color-bg-alt);
      color: var(--color-text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .hub {
      text-align: center;
      max-width: 500px;
      padding: 2rem;
    }

    .hub h1 {
      font-size: var(--text-2xl);
      color: var(--color-secondary);
      margin-bottom: 0.25rem;
    }

    .hub p {
      color: var(--color-text-light);
      margin-bottom: 1.5rem;
    }

    .hub__examples {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      text-align: left;
    }

    .hub__examples a {
      display: block;
      padding: 0.75rem 1rem;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-primary);
      font-weight: 500;
      transition: all 0.2s;
    }

    .hub__examples a:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-sm);
    }

    .hub__examples span {
      color: var(--color-text-light);
      font-weight: 400;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="hub">
    <h1>landingland</h1>
    <p>Exemples de landings (URLs plates)</p>
    <div class="hub__examples">
      <a href="/sac-anti-vol">Sac Anti-Vol <span>— ecommerce</span></a>
      <a href="/task-flow">TaskFlow <span>— saas</span></a>
      <a href="/tech-summit-2025">Tech Summit 2025 <span>— event</span></a>
      <a href="/portfolio-minimal">Portfolio Minimal <span>— freestyle</span></a>
    </div>
  </div>
</body>
</html>
